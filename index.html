<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Alisha & Dr. Prannoy | Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --maroon:#5b1025;
  --gold:#d8b35d;
  --cream:#fff8ef;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#fff8ef,#fff1f6);
  color:#4b2d35;
  overflow-x:hidden;
}

/* INTRO (MODERN CINEMATIC) */
.intro-overlay{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(180deg,#2c0712,#5b1025,#2c0712);
  transition:.8s;
}
.intro-overlay.hide{opacity:0;visibility:hidden}

.intro-glow{
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,220,150,.2), transparent 60%);
  animation:pulse 3s infinite;
}

.intro-center{text-align:center;color:#fff}

.intro-circle{
  width:90px;height:90px;
  border:2px solid var(--gold);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto auto 20px;
  font-family:'Cinzel',serif;
  font-size:22px;
  animation:float 3s infinite;
}

.intro-text h1{
  font-family:'Cinzel',serif;
  font-size:40px;
  margin-bottom:10px;
}

.intro-text p{font-size:14px;color:#f5e6c8}

@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:80px 20px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:40px 20px;
  box-shadow:0 20px 40px rgba(0,0,0,.1);
  max-width:600px;
  width:100%;
}

.script{
  font-family:'Great Vibes',cursive;
  font-size:36px;
  color:var(--gold);
}

.names{
  font-family:'Cinzel',serif;
  font-size:42px;
  margin:20px 0;
}

.date{
  margin-top:20px;
  background:var(--maroon);
  color:#fff;
  padding:12px 20px;
  border-radius:30px;
  display:inline-block;
}

/* IMAGE */
img{
  width:100%;
  border-radius:15px;
  margin-top:20px;
}

/* MUSIC BUTTON */
.audio-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--maroon);
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:30px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro-overlay" id="introOverlay">
  <div class="intro-glow"></div>

  <div class="intro-center">
    <div class="intro-circle">A ♡ P</div>
    <div class="intro-text">
      <h1>Dr. Alisha & Dr. Prannoy</h1>
      <p>Wedding Invitation</p>
    </div>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button class="audio-btn" id="playBtn">🎵 Music</button>

<!-- HERO -->
<section class="hero">
  <div class="card">

    <div class="script">Together with their families</div>

    <div class="names">
      Dr. Alisha <br>&<br> Dr. Prannoy
    </div>

    <p>
      With immense joy and love, we invite you to celebrate our wedding.
    </p>

    <div class="date">
      29 April 2026 · 8:00 PM
    </div>

    <!-- IMPORTANT: replace with your image -->
    <img src="couple.jpg" alt="Couple">

  </div>
</section>

<script>
// intro auto close
window.onload = function(){
  setTimeout(()=>{
    document.getElementById("introOverlay").classList.add("hide");
  },1500);

  setTimeout(()=>{
    document.getElementById("introOverlay").style.display="none";
  },2500);
};

// music control
const music = document.getElementById("music");
const btn = document.getElementById("playBtn");

btn.onclick = async ()=>{
  if(music.paused){
    await music.play();
    btn.innerText="⏸ Pause";
  }else{
    music.pause();
    btn.innerText="🎵 Music";
  }
};
</script>

</body>
</html>
