<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wedding Invitation</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  text-align:center;
  background:linear-gradient(#fff8ef,#fff1f6);
}

/* Intro */
#intro{
  position:fixed;
  inset:0;
  background:#5b1025;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
}

h1{
  font-size:32px;
}

.card{
  padding:40px 20px;
}

img{
  width:90%;
  border-radius:15px;
}

.date{
  background:#5b1025;
  color:white;
  padding:10px 20px;
  border-radius:20px;
  display:inline-block;
  margin-top:20px;
}

button{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#5b1025;
  color:white;
  border:none;
  padding:12px;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="intro">
  <h1>Dr. Alisha & Dr. Prannoy</h1>
  <p>Wedding Invitation</p>
</div>

<audio id="music" loop>
  <source src="music.mp3">
</audio>

<button onclick="toggleMusic()">🎵 Music</button>

<div class="card">

<h2>Dr. Alisha & Dr. Prannoy</h2>

<p>With love, we invite you to our wedding</p>

<div class="date">29 April 2026 · 8 PM</div>

<br><br>

<img src="couple.jpg">

<br><br>

<p><b>Jago & DJ Ceremony</b><br>
28 April · Mohali</p>

<p><b>Wedding</b><br>
29 April · Grand Rutba</p>

<p><b>Dinner</b><br>
2 May · Himachal</p>

</div>

<script>
setTimeout(()=>{
  document.getElementById("intro").style.display="none";
},1500);

function toggleMusic(){
  let m=document.getElementById("music");
  if(m.paused){m.play()}else{m.pause()}
}
</script>

</body>
</html>
