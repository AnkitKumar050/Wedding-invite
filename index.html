<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ENTRY SCREEN */
#entry {
    height: 100vh;
    background: linear-gradient(to bottom, #1a1a1a, #000);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

#openBtn {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    background: gold;
    color: black;
    cursor: pointer;
    border-radius: 30px;
}

/* GATE */
.gate {
    position: fixed;
    width: 50%;
    height: 100%;
    background: url('https://i.imgur.com/8Km9tLL.jpg');
    background-size: cover;
    top: 0;
    z-index: 10;
    transition: 1.5s;
}

.left { left: 0; }
.right { right: 0; }

.open .left { transform: translateX(-100%); }
.open .right { transform: translateX(100%); }

/* MAIN */
#main {
    display: none;
    text-align: center;
}

.hero img {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* TEXT */
.overlay {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
}

h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    margin: 0;
}

h2 {
    font-size: 22px;
    letter-spacing: 2px;
}

.names {
    font-size: 50px;
    margin-top: 20px;
    color: gold;
}

/* EVENTS */
.section {
    padding: 60px 20px;
    background: #111;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
    <h1>Dr. Alisha & Dr. Prannoy</h1>
    <button id="openBtn">Open Invitation</button>
</div>

<!-- GATES -->
<div class="gate left"></div>
<div class="gate right"></div>

<!-- MAIN -->
<div id="main">

<div class="hero">
    <img src="cover.jpg" alt="Wedding">
</div>

<div class="section">
    <h1>With Love & Blessings</h1>
    <p>Harvinder & Ravinder</p>
    <p>Sania & Sunia</p>
</div>

<div class="section">
    <h2>Wedding Events</h2>

    <div class="card">
        <h3>Haldi</h3>
        <p>28 April</p>
    </div>

    <div class="card">
        <h3>Wedding</h3>
        <p>29 April</p>
    </div>

</div>

</div>

<script>
document.getElementById("openBtn").onclick = function() {
    document.body.classList.add("open");

    setTimeout(() => {
        document.getElementById("entry").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 1500);
}
</script>

</body>
</html>
