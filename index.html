<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ENTRY SCREEN */
#entry {
    height: 100vh;
    background: linear-gradient(to bottom, #1a1a1a, #000);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

#openBtn {
    padding: 15px 40px;
    font-size: 20px;
    border: none;
    background: gold;
    color: black;
    cursor: pointer;
    border-radius: 30px;
    transition: 0.3s;
}

#openBtn:hover {
    transform: scale(1.05);
}

/* GATE - LADY IMAGE REMOVED */
.gate {
    position: fixed;
    width: 50%;
    height: 100%;
    /* Replaced the image link with an elegant dark red/maroon gradient */
    background: linear-gradient(to right, #4a0404, #2b0202); 
    border: 2px solid gold; /* Added a gold border for a premium feel */
    top: 0;
    z-index: 10;
    transition: 1.5s;
}

.left { left: 0; border-right: none; }
.right { right: 0; border-left: none; }

.open .left { transform: translateX(-100%); }
.open .right { transform: translateX(100%); }

/* MAIN */
#main {
    display: none;
    text-align: center;
}

.hero img {
    width: 100%;
    max-height: 80vh;
    object-fit: contain; /* Ensures your entire caricature is visible without cropping */
    margin-top: 20px;
}

/* TEXT */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    margin: 0;
}

h2 {
    font-size: 22px;
    letter-spacing: 2px;
}

.names {
    font-size: 50px;
    margin-top: 20px;
    color: gold;
}

/* EVENTS */
.section {
    padding: 60px 20px;
    background: #111;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    margin: 15px;
    border-radius: 10px;
    display: inline-block;
    min-width: 200px;
}

/* AUDIO BUTTON */
#audio-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: gold;
    color: black;
    border: none;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    z-index: 100;
    display: none;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Shehnai_music_for_weddings.mp3" type="audio/mpeg">
</audio>

<button id="audio-btn" onclick="toggleMusic()">🎵</button>

<div id="entry">
    <h1>Dr. Alisha & Dr. Prannoy</h1>
    <button id="openBtn">Open Invitation</button>
</div>

<div class="gate left"></div>
<div class="gate right"></div>

<div id="main">

<div class="hero">
    <img src="caricature.png" alt="Wedding Caricature">
</div>

<div class="section">
    <h1>With Love & Blessings</h1>
    <p>Harvinder & Ravinder</p>
    <p>Sania & Sunia</p>
</div>

<div class="section">
    <h2>Wedding Events</h2>

    <div class="card">
        <h3>Haldi</h3>
        <p>28 April</p>
    </div>

    <div class="card">
        <h3>Wedding</h3>
        <p>29 April</p>
    </div>

</div>

</div>

<script>
    const music = document.getElementById("bgMusic");
    const audioBtn = document.getElementById("audio-btn");
    let isPlaying = false;

    document.getElementById("openBtn").onclick = function() {
        document.body.classList.add("open");
        
        // Start music when gates open
        music.play().catch(error => {
            console.log("Audio playback was prevented by the browser.");
        });
        isPlaying = true;

        setTimeout(() => {
            document.getElementById("entry").style.display = "none";
            document.getElementById("main").style.display = "block";
            audioBtn.style.display = "block"; 
        }, 1500);
    }

    // Function to pause/play music
    function toggleMusic() {
        if (isPlaying) {
            music.pause();
            audioBtn.innerHTML = "🔇";
        } else {
            music.play();
            audioBtn.innerHTML = "🎵";
        }
        isPlaying = !isPlaying;
    }
</script>

</body>
</html>
